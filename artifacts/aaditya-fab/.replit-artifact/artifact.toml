kind = "web"
previewPath = "/"
title = "Aadity Fabrication Works"
version = "1.0.0"
id = "artifacts/aaditya-fab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23632

[services.development]
run = "pnpm --filter @workspace/aaditya-fab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aaditya-fab", "run", "build" ]
publicDir = "artifacts/aaditya-fab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23632"
BASE_PATH = "/"
