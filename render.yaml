services:
  - type: web
    name: aadity-website-builder
    env: node
    plan: free
    buildCommand: |
      npm install -g pnpm@latest
      pnpm install
      pnpm --filter @workspace/aaditya-fab run build
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db push
    startCommand: |
      cd artifacts/api-server
      pnpm start
    envVars:
      - key: PORT
        value: "10000"
      - key: BASE_PATH
        value: "/"
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: aadity-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health

databases:
  - name: aadity-db
    plan: free
    databaseName: aadity
    user: aadity
