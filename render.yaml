services:
  - type: web
    name: aadity-website-builder
    env: node
    plan: free
    buildCommand: |
      # Enable corepack and use pnpm
      corepack enable
      corepack prepare pnpm@9.15.1 --activate
      
      # Install all dependencies (including devDependencies)
      NODE_ENV=development pnpm install --no-frozen-lockfile
      
      # Build everything
      pnpm --filter @workspace/aaditya-fab run build
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db push
      
      # Seed the default admin
      cd lib/db
      node --import tsx/esm ./src/seed.ts
    startCommand: |
      cd artifacts/api-server
      pnpm start
    envVars:
      - key: PORT
        value: "10000"
      - key: BASE_PATH
        value: "/"
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: aadity-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health

databases:
  - name: aadity-db
    plan: free
    databaseName: aadity
    user: aadity
