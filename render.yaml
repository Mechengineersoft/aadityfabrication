services:
  - type: web
    name: aadity-website-builder
    env: node
    plan: free
    buildCommand: |
      # Enable corepack and use pnpm
      corepack enable
      corepack prepare pnpm@9.15.1 --activate
      
      # Install all dependencies (including devDependencies)
      NODE_ENV=development pnpm install --no-frozen-lockfile
      
      # Build everything
      pnpm --filter @workspace/aaditya-fab run build
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db push
      
      # Seed the default admin
      cd lib/db
      node --import tsx/esm ./src/seed.ts
    startCommand: |
      cd artifacts/api-server
      pnpm start
    envVars:
      - key: PORT
        value: "10000"
      - key: BASE_PATH
        value: "/"
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: aadity-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GMAIL_APP_PASSWORD
        value: "poex roor xtyg kmjh"
      - key: WHATSAPP_ACCESS_TOKEN
        value: "EAATMsTIyn8kBRsGeIXHxCjkLetZA9wf3HGgE1wOfmqlfOcGUkxYnFtQdDzGr4eZAe6mC5KDVpyvez7u7rttFCmZC0uZBY0Dy49ilZC8Qisg5Nbt0pXuGv6dcoo1JZBr2gYIvdk5WPo7T9OVeW0N8bDOXwr31Oi3liVH1ZCc4sDWRS49EqXxSMw1CtKzQ8lTXSQXecw1lf917CQuLvaWQidj06Fk0HZBqFmKuJUkJNUu9TAIOOnQZBUjsnXhcLBc58XZAW4RjPmPODVPEP5T5EXoHiQ"
